  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(150deg, #f5f0ff 0%, #fdf4ff 40%, #fff0f6 100%);
      min-height: 100vh; padding: 40px 20px 80px;
      direction: rtl;
    }

    .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; opacity: .18; }

    header, .search-wrap, .result-info, #results { position: relative; z-index: 1; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 {
      font-size: 2.1rem; font-weight: 800;
      background: linear-gradient(135deg, #7c3aed 0%, #c026d3 60%, #e11d74 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px; letter-spacing: .5px;
    }
    header p { color: #6b7280; font-size: .92rem; }

    .search-wrap { max-width: 720px; margin: 0 auto 10px; position: relative; }
    .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #a78bfa; font-size: 1.1rem; pointer-events: none; }
    #search-input {
      width: 100%; background: #fff; border: 2px solid #e9d5ff;
      color: #111827; padding: 16px 48px 16px 18px;
      border-radius: 14px; font-size: 1rem;
      box-shadow: 0 4px 20px rgba(124,58,237,.1);
      transition: border-color .2s, box-shadow .2s; direction: auto;
    }
    #search-input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 4px 24px rgba(124,58,237,.2); }
    #search-input::placeholder { color: #c4b5fd; }

    .result-info { max-width: 720px; margin: 0 auto 20px; font-size: .78rem; color: #9ca3af; text-align: left; direction: ltr; }
    .result-info span { color: #7c3aed; font-weight: 700; }

    #results { max-width: 720px; margin: 0 auto; }

    .ep-card {
      background: #fff; border: 1.5px solid #ede9fe;
      border-radius: 16px; padding: 20px 24px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(124,58,237,.06);
      transition: box-shadow .2s, transform .15s, border-color .2s;
      position: relative; overflow: hidden;
    }
    .ep-card::before {
      content: ''; position: absolute; right: 0; top: 0; bottom: 0;
      width: 4px; background: linear-gradient(180deg, #7c3aed, #e11d74);
      border-radius: 0 14px 14px 0;
    }
    .ep-card:hover { box-shadow: 0 6px 28px rgba(124,58,237,.14); transform: translateY(-2px); border-color: #c4b5fd; }

    .ep-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .ep-num {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; font-size: .63rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0; margin-top: 3px;
    }
    .ep-title { font-size: 1rem; font-weight: 700; color: #111827; line-height: 1.4; flex: 1; }
    .ep-date { font-size: .72rem; color: #9ca3af; white-space: nowrap; flex-shrink: 0; margin-top: 4px; }

    .ep-desc { font-size: .84rem; color: #4b5563; line-height: 1.65; margin-right: 4px; direction: rtl; text-align: right; }

    .ep-listen {
      display: inline-block; margin-top: 12px;
      font-size: .74rem; color: #7c3aed; text-decoration: none;
      border: 1.5px solid #c4b5fd; border-radius: 20px;
      padding: 5px 14px; font-weight: 600; transition: all .15s;
    }
    .ep-listen:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    mark { background: rgba(192,38,211,.13); color: #a21caf; border-radius: 3px; padding: 0 2px; }

    .state-msg { max-width: 720px; margin: 60px auto; text-align: center; color: #9ca3af; font-size: .95rem; }
    .state-msg strong { display: block; font-size: 2.8rem; margin-bottom: 12px; }
  </style>
</head>

  [106, "הגבר המיני — כשציפייה פוגשת מציאות", "מאי 2026", "מיניות גברית, ציפיות מול מציאות, פגיעות רגשית, אינטימיות בנישואים, עייפות, מיניות אחרי ילדים, תפקידים מגדריים, זהות גברית בחדר השינה. אורח: חנניאל רוס, פסיכולוג קליני."],

  [104, "לא רק תנועות עיניים — EMDR", "מרץ 2026", "טיפול EMDR לטראומה — גירוי דו-צדדי, איך הוא עובד על המוח, יעילות מחרדת מבחנים ועד PTSD מורכב, טיפול קבוצתי. ד\"ר אודי אורן מסביר את הפרוטוקול שלב אחרי שלב. טיפול אחרי השביעי באוקטובר."],
  [103, "המכורים המתפקדים — האם כולנו מכורים לקנאביס?", "מרץ 2026", "התמכרות לקנאביס ומכורים מתפקדים. מנגנוני המוח שמניעים שימוש חוזר, היכן הגבול בין הרגל להתמכרות, השפעות על קשרים בינאישיים, מיתוסים על קנאביס רפואי. פרופ' דניאל פיינגולד, מומחה להתמכרויות."],
  [102, "דימוי גוף — הזוגיות שלנו עם עצמנו", "פברואר 2026", "95% מהאנשים רוצים לשנות משהו בגופם. דימוי גוף מול שווי עצמי, ביקורת עצמית, גוף חיובי, מתי מתפתח דימוי הגוף, קבלה עצמית ללא תנאי, משקל ומראה חיצוני. פסיכולוגית קלינית."],
  [101, "חוסן נפשי אחרי מלחמה — פוסט טראומה ופסיכולוגיה חיובית", "ינואר 2026", "חוסן לאחר מלחמה, שינויי המוח בהחלמה מטראומה, פסיכולוגיה חיובית, תמיכה חברתית, מסוגלות עצמית, PTSD, הכרת תודה. פרופ' אורן קפלן, פסיכולוג קליני ומומחה לפוסט-טראומה."],
  [100, "הקול בראש — על הדיבור הפנימי שלנו", "ינואר 2026", "דיבור פנימי ושיחה עצמית — מהו הקול בראשנו, מנגנונים נוירולוגיים, התפתחות אצל ילדים, אנשים ללא דיבור פנימי, הפיכת שיחה עצמית ביקורתית לכלי פרודוקטיבי. פרופ' חמוטל קריינר, שפה וחשיבה."],

  [96, "איך באמת משנים הרגלים?", "אוקטובר 2025", "מנגנוני שינוי הרגלים — למה הסברים לא עובדים, סביבה קובעת הצלחה, שינוי התנהגותי מתמשך. ד\"ר אפרת גיל התמרה מ-125 ק\"ג לספורטאית. מה גורם לשינוי אמיתי."],
  [95, "לצאת מהגיהנום הרגשי — טיפול DBT", "ספטמבר 2025", "טיפול DBT דיאלקטי-התנהגותי — פותח על ידי פרופ' מרשה לינהאן מטראומה אישית. ויסות רגשי, אישיות גבולית, דיסרגולציה רגשית, סבילות למצוקה, מיינדפולנס. אסתי ברוקמן, פסיכולוגית קלינית."],
  [94, "עובד מחפש משמעות", "ספטמבר 2025", "משמעות בעבודה — מה יוצר סיפוק בעבודה, שחיקה לעומת חוסר משמעות עמוק, סיבות לעזיבת מקומות עבודה, מרכיבי עבודה משמעותית. יארה אלדמה, פסיכולוגית תעסוקה."],

  [84, "להיות בלשי אהבה — איך מתקשרים בזוגיות?", "פברואר 2025", "תקשורת זוגית ושמירה על מערכת יחסים — סיום שלב ירח הדבש, שגרה, קירות עולים, אכזבה, תסכול. למה הכל תלוי בתקשורת ובהקשבה. סלבי פרידמן, מאמן זוגות."],
  [83, "כדור הארץ שטוח — פסיכולוגיה קונספרטיבית", "ינואר 2025", "פסיכולוגיה של תיאוריות קונספירציה — רצח רבין, שבב בחיסון, כפירה בנחיתה על הירח, ארץ שטוחה, קורונה. למה אנשים מאמינים, למה קשה להפריך, אחוז יציב של מאמינים. ד\"ר חיים שפירא."],
  [82, "דרך המסך — טיפול אינטרנטי", "ינואר 2025", "טיפול מקוון וטלה-תרפיה — מחסור במטפלים בישראל ובעולם, דיגיטציה בקורונה, האם AI יכול להחליף מטפלים, יעילות בריאות נפש דיגיטלית. ד\"ר יוני שלום, אוניברסיטת חיפה."],
  [81, "כוחה של קבוצה — אנליזה קבוצתית", "דצמבר 2024", "טיפול קבוצתי — נולד אחרי משבר בריאות הנפש שלאחר מלחמת העולם השנייה, דינמיקה קבוצתית לעומת טיפול פרטני, למי מתאים, ריפוי קולקטיבי, פסיכואנליזה. יעל שחר."],
  [80, "הפסיכולוגיה של ההגשמה העצמית — איך בוחרים מקצוע?", "נובמבר 2024", "פסיכולוגיה של בחירת קריירה וזהות תעסוקתית — השפעת הורים, זיהוי חוזקות, הגשמה עצמית תעסוקתית, עיצוב חיים, משבר קריירה. פרופ' הדסה ליטמן עובדיה."],
  [79, "אכילה רגשית — ממחר דיאטה?", "אוקטובר 2024", "אכילה רגשית — אכילת נחמה, אוכל כעונש או פרס, הגבלה ואכילת יתר, קשר בין אוכל משקל ודימוי גוף, אכילה מודעת, פסיכולוגיית תזונה. טל חמרה ששון, דיאטנית קלינית."],
  [78, "אחים — יחסי אהבה שנאה", "ספטמבר 2024", "יחסי אחים — השפעות סדר לידה, תחרות על משאבים ותשומת לב, פערי מגדר וגיל, תכונות אישיות של בכור אמצעי וצעיר, יריבות ואהבת אחים. ד\"ר אבידן מילבסקי."],
  [77, "איך בגדים משפיעים עלינו? הפסיכולוגיה של הלבוש", "ספטמבר 2024", "פסיכולוגיה של אופנה — השפעת בגדים על מצב הרוח ותחושות, ויסות רגשי דרך לבוש, תפיסה עצמית, ביטחון עצמי, enclothed cognition. ד\"ר טלי סטולובי, חוקרת פסיכולוגיית לבוש."],
  [76, "אני מרגיש משמע אני קיים", "אוגוסט 2024", "רגשות וקבלה רגשית — מהם רגשות, עיבוד רגשי בריא, עלויות ניתוק רגשי, חיבור לרגשות פנימיים. ד\"ר אלינור פרדס, פסיכולוגית קלינית."],
  [75, "איך אנחנו תופסים את העולם?", "יולי 2024", "תפיסה חזותית ומציאות — תופעת השמלה (זהב-לבן מול כחול-שחור), הבדלי תפיסה בין אנשים, תפיסת מבוגרים לעומת ילדים, אשליות אופטיות, מציאות אובייקטיבית או סובייקטיבית. פרופ' צבי גנל."],
  [74, "כל העיניים אליי — חרדה חברתית", "יוני 2024", "הפרעת חרדה חברתית — ההבדל מביישנות, מתח בבטן, פחד ממבטי אחרים, חרדת דיבור, הימנעות משיחות, טיפול CBT, טיפול בחשיפה. ד\"ר מרים לוין-גורן, פסיכולוגית קלינית."],
  [73, "משעמם לי וזה בלתי נסבל — למה חשוב להשתעמם?", "יוני 2024", "פסיכולוגיה של שעמום — מהו שעמום, למה הוא חשוב, אסטרטגיות יציאה ממנו, סקרנות, יצירתיות ושעמום, שביעות רצון מהחיים. ד\"ר גדי-עון, חוקר שעמום, הפקולטה הפתוחה."],
  [72, "מהי מודעות?", "מאי 2024", "פסיכולוגיה של תודעה — היכן נמצאת התודעה, מוח לעומת דואליזם, תודעת בעלי חיים, תודעת AI עתידית, הבעיה הקשה של תודעה. פרופ' ליאד מודריק, מדעי המוח אוניברסיטת תל אביב."],
  [71, "פגיעה מוסרית — אל תמחאו לי כפיים", "מאי 2024", "פגיעה מוסרית — פגיעה במוסריות ולא בגוף, חיילים, השביעי באוקטובר, טראומה, PTSD, זיכרון דור שפיר שנרצח בשביעי באוקטובר. פרופ' יוסי לוי-בלז, מומחה לטראומה."],
  [70, "למה קשה לנו לקבל החלטות?", "מאי 2024", "פסיכולוגיה של קבלת החלטות — 35,000 החלטות ביום, עייפות החלטות, הטיה קוגניטיבית, מהי החלטה טובה, שיפור תהליך ההחלטה, שיתוק מבחירה. אלעד מיכלוביץ-סוקר."],
  [69, "עיוותי חשיבה — הרכיב הקוגניטיבי של CBT", "אפריל 2024", "עיוותי חשיבה — קריאת מחשבות, הפרטה, האשמה עצמית, קטסטרופיזציה, חשיבה שחור-לבן, מסגור מחדש בCBT, דפוסי דיכאון וחרדה. אשר שורק, פסיכולוג חינוכי."],
  [68, "הסודות שאנו מסתירים", "אפריל 2024", "סודות לעומת שקרים — מסרים מעורבים בילדות, סוגי סודות, עלויות אישיות של סודות, מתי סודות מזיקים, טיפול זוגי ומשפחתי. נעמה משה, מטפלת CBT."],
  [67, "מוט הברזל ששינה את פיניאס גייג׳ — על נוירופסיכולוגיה", "מרץ 2024", "מקרה נוירופסיכולוגי — פיניאס גייג' 1848, מוט ברזל דרך המוח, שינוי אישיות לאחר פגיעת מוח, אונה קדמית, התנהגות ואופי. ד\"ר נעמה קיבילס מאירי, נוירופסיכולוגית שיקומית."],
  [66, "צעדים קטנים ליצירת שינויים גדולים", "מרץ 2024", "צעדים קטנים לשינוי גדול — יצירת הרגלים, עיצוב סביבה, מדוע קשה לבנות הרגלים בריאים, התמדה, עקביות. חלק ב'. יהודית כץ, מנחת פודקאסט Thinking Well."],
  [65, "יצירת הרגלים חדשים", "פברואר 2024", "יסודות יצירת הרגלים — מהם הרגלים, ההבדל בין מטרות הרגלים והתמכרויות, בניית הרגלים בריאים והיפטרות ממזיקים. חלק א'. יהודית כץ, מנחת פודקאסט Thinking Well."],
  [64, "האושר טמון בחברות אמת", "פברואר 2024", "חברויות משמעותיות ואושר — מחקר הרווארד 75 שנה משנת 1938, קשרים חברתיים וכל תחומי החיים, הבדלי מגדר בחברות, קשרים משמעותיים. ד\"ר אלון וסרמן, מייסד תוכנית Friends."],
  [63, "משמעות מחפשת אדם", "ינואר 2024", "משמעות בחיים המודרניים — שאלה קיומית, למה לקום בבוקר, משמעות כשאין אמת אחת, משמעות בזמן משבר. ד\"ר פנינית רוסוב-נצר, חוקרת ומרצה."],
  [62, "מציאת קצב הלב הנכון", "ינואר 2024", "ויסות קצב לב, ויסות רגשי דרך נשימה, ביופידבק, קוהרנטיות לב, מערכת עצבים, הרפיה ושליטה פיזיולוגית."],
  [61, "השינוי מתחיל היום", "דצמבר 2023", "שינוי התנהגות והתגברות על דחיינות — קיפאון התנהגותי, מוטיבציה, להתחיל מחדש, החלטות לשנה חדשה, איך משנים בפועל."],
  [60, "מה הזהות הדיגיטלית שלנו אומרת עלינו?", "דצמבר 2023", "זהות דיגיטלית וייצוג עצמי מקוון — רשתות חברתיות, אינסטגרם, ניהול רושם, מה ההתנהגות המקוונת שלנו חושפת, טביעת רגל דיגיטלית."],
  [59, "אני לא אתנהג כמו ההורים שלי", "נובמבר 2023", "טראומה בין-דורית ודפוסי משפחה — שבירת מעגלים, הורות שונה, טראומה עוברת, איך אנחנו חוזרים על התנהגות ההורים שלנו, פצעי ילדות."],
  [58, "תנועה לעבור החלמה", "נובמבר 2023", "נרטיבים של החלמה מפוסט-טראומה, טיפול בתנועה, בעקבות השביעי באוקטובר, ריפוי אחרי אירועים טראומטיים, חוסן, טיפול סומטי."],
  [57, "מלחמה — חרדה, אשמה וחוסן", "אוקטובר 2023", "פסיכולוגיה של מלחמה — חרדה ופחד בזמן מלחמה, אשמת שורדים, חוסן נפשי, בריאות נפש בזמן עימות, השביעי באוקטובר, התמודדות חיילים ואזרחים."],
  [55, "במי אנחנו מקנאים ולמה", "אוקטובר 2023", "קנאה ורגשנות — ההבדל בין קנאה לקנאנות, השוואה חברתית, למה אנחנו מקנאים, תגובות רגשיות להצלחת אחרים, התמודדות עם קנאה."],
  [54, "להגיב טוב יותר", "ספטמבר 2023", "ויסות רגשי — תגובה לעומת פעולה, ניהול תגובות רגשיות, טריגרים, עצירה לפני התגובה, אינטליגנציה רגשית, ניהול כעסים."],
  [51, "הטוב המוחלט, הרע המוחלט", "אוגוסט 2023", "תיאוריית קליין הפסיכואנליטית — יחסי אובייקט, מנגנון הפיצול, אובייקטים טובים ורעים, הזדהות השלכתית, פסיכולוגיה גבולית."],
  [50, "איך להגן על הילדים שלנו", "אוגוסט 2023", "הגנת ילדים מאלימות משפחתית — חשיפת ילדים לאלימות ביתית, חוסן בילדים, אסטרטגיות הורות, הגנת ילדים."],
  [49, "הילדה שחלמה על חיים אחרים", "אוגוסט 2023", "התעללות רגשית והזנחה בילדות — גדילה במשפחה קשה, השפעות טראומת ילדות, ריפוי מפצעי ילדות."],
  [48, "איך לתקן לב שבור", "אוגוסט 2023", "ריפוי מאהבה — פסיכולוגיה של פרידה, אבל לאחר סיום קשר, אהבה עצמית אחרי פרידה, ריפוי רגשי, התקשרות ואובדן."],
  [47, "איך אנחנו מגינים על עצמנו — מנגנוני הגנה, חלק ב׳", "יולי 2023", "מנגנוני הגנה חלק ב' — השלכה, הכחשה, רציונליזציה, אינטלקטואליזציה, סובלימציה, פיצול, תיאוריית ההגנה הפסיכואנליטית."],
  [46, "אל תוך הלא מודע — מנגנוני הגנה, חלק א׳", "יולי 2023", "מנגנוני הגנה לא-מודעים חלק א' — פרויד, הדחקה, התת-מודע, למה אנחנו מפתחים הגנות, תיאוריה פסיכואנליטית."],
  [45, "האם כולנו מכורים?", "יוני 2023", "פסיכולוגיה של התמכרות — מהי התמכרות, סוגי התמכרויות, דופמין ומערכת התגמול, התמכרות התנהגותית, שימוש בסמים, טיפול, החלמה."],
  [44, "למה קשה לנו לבחור", "יוני 2023", "שיתוק הבחירה — פרדוקס הבחירה, חרדת החלטות, בארי שוורץ, אפשרויות רבות מדי, מקסימייזרים לעומת מסתפקים, בחירת קריירה וזוגיות."],
  [43, "האם הפרעות קשב וריכוז הן בעיות?", "מאי 2023", "ADHD הפרעת קשב וריכוז — אבחון, אבחון-יתר, השפעה חינוכית, תרופות, הגדרה מחדש של ADHD כשונה ולא כלוקה, מבוגרים עם ADHD."],
  [42, "קודם כל תרגעו", "מאי 2023", "ניהול מתח — טכניקות הרפיה, תרגילי נשימה, הרפיית שרירים מתקדמת, השפעות מתח כרוני, אסטרטגיות התמודדות, מתח בעבודה."],
  [41, "זהירות מתחזה לפנייך", "אפריל 2023", "תסמונת המתחזה — ספק עצמי, תחושת הונאה, חרדה של בעלי הישגים גבוהים, פרפקציוניזם, מי סובל מתסמונת המתחזה, כיצד להתגבר עליה."],
  [40, "הסוד לגירושים בריאים", "אפריל 2023", "פסיכולוגיה של גירושים — השפעת הפרידה על ילדים, הורות משותפת, איך אומרים לילדים על גירושים, ריפוי רגשי לאחר סיום קשר."],
  [39, "איך אפשר להציל חיים", "מרץ 2023", "מניעת התאבדות — זיהוי סימני אזהרה, מה לומר למישהו בסיכון, התערבות במשבר, עזרה ראשונה נפשית, איך לעזור לחבר."],
  [38, "המחיר האמיתי של הסמארטפון", "מרץ 2023", "התמכרות לסמארטפון ופסיכולוגיה — השפעות זמן מסך, אור כחול, השוואה חברתית ברשתות, FOMO, רווחה דיגיטלית, ילדים וטלפונים."],
  [37, "להסתגל למציאות חדשה", "מרץ 2023", "הסתגלות להפרעת הסתגלות — אבל, אובדן, התמודדות עם שינוי, הגירה, גירושים, מוות, מעברי חיים משמעותיים, חוסן."],
  [36, "לקבל, להתחייב, לעשות שינוי", "פברואר 2023", "טיפול ACT — קבלה ומחויבות, גמישות פסיכולוגית, מיינדפולנס, בירור ערכים, פעולה מחויבת, חיים משמעותיים."],
  [35, "אינטליגנציה בריאותית", "ינואר 2023", "קשר גוף-נפש — פסיכולוגיית בריאות, מחלה פסיכוסומטית, אפקט הפלצבו, כיצד רגשות משפיעים על בריאות פיזית, פסיכולוגיית רווחה."],
  [34, "ללא סימנים כחולים", "ינואר 2023", "התעללות רגשית בלתי נראית — נזק פסיכולוגי ללא סימנים פיזיים, התעללות סמויה, מניפולציה, גזלייטינג, זיהוי דפוסי התעללות רגשית."],
  [33, "לשחרר את הנוקשות", "ינואר 2023", "גמישות פסיכולוגית — התגברות על קשיחות קוגניטיבית, חשיבה שחור-לבן, קבלת אי-ודאות, גמישות מנטלית, פתיחות לשינוי."],

function makeSlug(title) {
  const cleaned = title
    .replace(/[—–,?!'".()\[\]\/׳״]/g, ' ')
    .replace(/-/g, ' ')
    .trim()
    .replace(/\s+/g, '-');
  const full = cleaned + '-עושים-פסיכולוגיה';
  return [...full].slice(0, 37).join('');
}

function epUrl(title) {
  return 'https://osimhistoria.com/podcast/' + makeSlug(title) + '/';
}

function normalize(str) { return str.toLowerCase().trim(); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, terms) {
  if (!terms.length) return escHtml(text);
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function scoreEpisode(ep, terms) {
  const titleNorm = normalize(ep[1]);
  const descNorm  = normalize(ep[3]);
  let score = 0;
  for (const t of terms) {
    const tl = normalize(t);
    if (!tl) continue;
    if (titleNorm.includes(tl)) score += titleNorm === tl ? 100 : 60;
    if (descNorm.includes(tl))  score += 20;
  }
  if (terms.every(t => titleNorm.includes(normalize(t)))) score += 40;
  if (terms.every(t => descNorm.includes(normalize(t))))  score += 10;
  return score;
}

function doSearch(query) {
  const q = query.trim();
  if (q.length < 2) return null;
  const terms = q.split(/\s+/).filter(t => t.length >= 1);
  return EPISODES
    .map(ep => ({ ep, score: scoreEpisode(ep, terms) }))
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score || b.ep[0] - a.ep[0]);
}

function renderCard(ep, terms) {
  const [num, title, date, desc] = ep;
  return `
    <div class="ep-card">
      <div class="ep-top">
        <span class="ep-num">פרק ${num}</span>
        <span class="ep-title">${highlight(title, terms)}</span>
        <span class="ep-date">${date}</span>
      </div>
      <div class="ep-desc">${highlight(desc, terms)}</div>
      <a class="ep-listen" href="${epUrl(title)}" target="_blank" rel="noopener">להאזנה ←</a>
    </div>`;
}

function renderState(results, query) {
  const ri = document.getElementById('result-info');
  const rd = document.getElementById('results');
  if (results === null) {
    ri.innerHTML = '';
    rd.innerHTML = '<div class="state-msg"><strong>🧠</strong>הקלידו נושא, תסמונת, שם טיפול או כל מילת מפתח</div>';
    return;
  }
  const terms = query.trim().split(/\s+/).filter(Boolean);
  if (results.length === 0) {
    ri.innerHTML = '';
    rd.innerHTML = `<div class="state-msg"><strong>🔎</strong>לא נמצאו פרקים עבור "<b>${escHtml(query)}</b>"<br><br><small>נסו מילה אחרת — למשל: חרדה, OCD, טראומה, זוגיות…</small></div>`;
    return;
  }
  ri.innerHTML = `<span>${results.length}</span> פרק${results.length !== 1 ? 'ים' : ''} נמצא${results.length !== 1 ? 'ו' : ''}`;
  rd.innerHTML = results.map(r => renderCard(r.ep, terms)).join('');
}

const input = document.getElementById('search-input');
input.addEventListener('input', () => {
  const q = input.value;
  renderState(doSearch(q), q);
});
renderState(null, '');
</script>
